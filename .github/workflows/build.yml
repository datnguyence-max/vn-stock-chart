name: Build Windows EXE

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vnstock plotly dash pandas pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "VNStockChart" `
            --icon "icon.ico" `
            --add-data "assets;assets" `
            --hidden-import "dash" `
            --hidden-import "dash_core_components" `
            --hidden-import "dash_html_components" `
            --hidden-import "dash.dependencies" `
            --hidden-import "plotly" `
            --hidden-import "plotly.graph_objects" `
            --hidden-import "plotly.subplots" `
            --hidden-import "vnstock" `
            --hidden-import "pandas" `
            app.py
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNStockChart-Windows
          path: dist/VNStockChart.exe
          retention-days: 30

      - name: Upload to Release (nếu là release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VNStockChart.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
