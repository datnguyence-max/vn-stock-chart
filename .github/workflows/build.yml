name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vnstock==3.2.1 plotly dash pandas pyinstaller

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --name "VNStockChart" `
            --hidden-import "vnstock" `
            --hidden-import "vnstock.explorer" `
            --hidden-import "vnstock.explorer.kbs" `
            --hidden-import "vnstock.explorer.tcbs" `
            --hidden-import "vnstock.explorer.vci" `
            --hidden-import "dash" `
            --hidden-import "dash_core_components" `
            --hidden-import "dash_html_components" `
            --hidden-import "dash.dependencies" `
            --hidden-import "plotly" `
            --hidden-import "plotly.graph_objects" `
            --hidden-import "plotly.subplots" `
            --hidden-import "pandas" `
            --hidden-import "flask" `
            --hidden-import "flask_compress" `
            --collect-all "vnstock" `
            --collect-all "dash" `
            --collect-all "dash_core_components" `
            --collect-all "dash_html_components" `
            vn_stock_chart.py
        shell: pwsh

      - name: Verify EXE exists
        run: |
          if (Test-Path "dist\VNStockChart.exe") {
            Write-Host "BUILD OK - size: $((Get-Item 'dist\VNStockChart.exe').Length / 1MB) MB"
          } else {
            Write-Host "BUILD FAILED - EXE not found"
            exit 1
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNStockChart-Windows
          path: dist\VNStockChart.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\VNStockChart.exe
          name: "VN Stock Chart ${{ github.ref_name }}"
          body: |
            ## VN Stock Chart ${{ github.ref_name }}

            ### Cách dùng
            1. Download `VNStockChart.exe`
            2. Double-click để chạy (lần đầu mở hơi chậm ~10-20 giây)
            3. Mở trình duyệt tại `http://127.0.0.1:8050`

            ### Tính năng
            - Biểu đồ nến Nhật / đường giá cổ phiếu VN (HOSE, HNX, UPCOM)
            - Nguồn dữ liệu: vnstock (KBS / TCBS)
            - MA20, MA50, MA200 | Volume | So sánh % nhiều mã
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
